name: Quietlyy — Generate & Post Video

on:
  # Run daily at 2:00 PM UTC (9 AM EST / 7:30 PM IST — peak global engagement)
  schedule:
    - cron: '0 14 * * *'

  # Manual trigger from GitHub (works from Android tablet)
  workflow_dispatch:
    inputs:
      skip_post:
        description: 'Skip Facebook posting (just generate video)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      custom_topic:
        description: 'Override topic (leave empty for random)'
        required: false
        default: ''
        type: string

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation

      - name: Run pipeline
        env:
          # Script generation (Gemini primary, Groq fallback)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Voice (ElevenLabs only)
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          # Image generation (Pollinations primary, Pixabay/Pexels fallback)
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # Facebook posting
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.skip_post }}" = "true" ]; then
            ARGS="--skip-post"
          fi
          python scripts/pipeline.py $ARGS

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quietlyy-video-${{ github.run_number }}
          path: |
            output/quietlyy_video.mp4
            output/script.json
            output/manual_caption.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload debug info
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: debug-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
