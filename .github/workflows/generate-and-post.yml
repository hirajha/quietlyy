name: Quietlyy -- Generate & Post Video

on:
  schedule:
    # ── Primary slots ─────────────────────────────────────────────────────────
    - cron: '30 1 * * *'   # 07:00 AM IST  (primary)
    - cron: '30 5 * * *'   # 11:00 AM IST  (primary)
    - cron: '30 9 * * *'   # 02:30 PM IST  (primary)
    - cron: '30 16 * * *'  # 10:00 PM IST  (primary)
    # ── Backup slots — fire 90 min after each primary ─────────────────────────
    # GitHub Actions free-tier crons can be silently dropped during high load
    # (e.g. 07:00 IST slot was missed 2026-05-15). Backups auto-skip if the
    # primary already succeeded (see "Skip if recent success" step below).
    - cron: '0 3 * * *'    # 08:30 AM IST  (backup for 07:00)
    - cron: '0 7 * * *'    # 12:30 PM IST  (backup for 11:00)
    - cron: '0 11 * * *'   # 04:30 PM IST  (backup for 02:30 PM)
    - cron: '0 18 * * *'   # 11:30 PM IST  (backup for 10:00 PM)

  workflow_dispatch:
    inputs:
      post_to_social:
        description: 'Post to Facebook + Instagram? (true = post, false = generate only)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      post_to_youtube:
        description: 'Post to YouTube Shorts? (true = post, false = skip)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      custom_topic:
        description: 'Override topic (leave empty for AI-selected)'
        required: false
        default: ''
        type: string
      style:
        description: 'Force a style: love / emotional / nostalgic / poetic / wisdom'
        required: false
        default: ''
        type: string

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Skip if recent success exists (idempotency for backup crons)
        # Backup crons fire 90 min after primaries. If the primary already
        # succeeded, this run is redundant — exit cleanly. Workflow_dispatch
        # (manual triggers) ALWAYS run regardless.
        id: dedupe
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Count successful runs of THIS workflow in the last 80 minutes
          SINCE=$(date -u -d '80 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          COUNT=$(gh run list \
            --workflow=generate-and-post.yml \
            --status=success \
            --created=">=${SINCE}" \
            --limit=5 \
            --json databaseId \
            --jq 'length')
          echo "Recent successful runs in last 80 min: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✓ Primary run already succeeded — backup will skip"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "→ No recent run found — proceeding (this slot was missed or is a primary)"
          fi

      - name: Set up Python
        if: steps.dedupe.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache apt packages
        if: steps.dedupe.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}-v1
          restore-keys: apt-ffmpeg-${{ runner.os }}-

      - name: Install dependencies
        if: steps.dedupe.outputs.skip != 'true'
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu fonts-liberation

      - name: Run pipeline
        if: steps.dedupe.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.post_to_social }}" = "false" ]; then
            ARGS="$ARGS --skip-post"
          fi
          if [ "${{ github.event.inputs.post_to_youtube }}" = "false" ]; then
            ARGS="$ARGS --skip-youtube"
          fi
          if [ -n "${{ github.event.inputs.custom_topic }}" ]; then
            ARGS="$ARGS --topic=${{ github.event.inputs.custom_topic }}"
          fi
          if [ -n "${{ github.event.inputs.style }}" ]; then
            ARGS="$ARGS --style=${{ github.event.inputs.style }}"
          fi
          python scripts/pipeline.py $ARGS

      - name: Save gallery + research cache to repo
        if: always() && steps.dedupe.outputs.skip != 'true'
        run: |
          git config user.name "Quietlyy Bot"
          git config user.email "bot@quietlyy.com"
          if [ -f output/pipeline_status.json ]; then
            cp output/pipeline_status.json assets/last_run_status.json
          fi
          git add -f assets/gallery/ assets/market_research.json assets/used_scripts.json assets/used_topics.json assets/last_run_status.json || true
          git diff --cached --quiet || git commit -m "Bot: gallery + research cache [run #${{ github.run_number }}]"
          git push || true

      - name: Show pipeline status in log
        if: always() && steps.dedupe.outputs.skip != 'true'
        run: |
          if [ -f output/pipeline_status.json ]; then
            echo "===== PIPELINE STATUS ====="
            cat output/pipeline_status.json
            echo "==========================="
          fi
          if [ -f output/youtube_error.json ]; then
            echo "::error::YouTube posting failed"
            cat output/youtube_error.json
          fi
          if [ -f output/instagram_error.json ]; then
            echo "::error::Instagram posting failed"
            cat output/instagram_error.json
          fi
          if [ -f output/post_result.json ]; then
            echo "===== FACEBOOK RESULT ====="
            cat output/post_result.json
            echo "==========================="
          fi

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        if: always() && steps.dedupe.outputs.skip != 'true'
        with:
          name: quietlyy-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            output/pipeline_status.json
            output/quietlyy_video.mp4
            output/thumbnail.jpg
            output/script.json
            output/seo_metadata.json
            output/post_result.json
            output/instagram_result.json
            output/instagram_error.json
            output/youtube_result.json
            output/youtube_error.json
            output/manual_caption.txt
            output/copyright_check.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload debug info on failure
        uses: actions/upload-artifact@v4
        if: failure() && steps.dedupe.outputs.skip != 'true'
        with:
          name: debug-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
