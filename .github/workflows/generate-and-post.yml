name: Quietlyy -- Generate & Post Video

on:
  schedule:
    # ── 2 posts per day (Facebook research: 1-2 posts/day is optimal) ─────────
    # Posting 4x/day was triggering algorithmic suppression on new accounts.
    # Reduced to morning + evening, 12 hours apart, matching Whisprs cadence.
    # ── 4 posts/day, targeting prime-time evening windows of our 3 biggest
    #    audiences (US, Europe, India — per market_research.json) ──────────────
    # Emotional content peaks in EVENING local time (7-10pm) when people unwind.
    # These 4 slots hit different global prime windows, ~6h apart:
    - cron: '0 1 * * *'    # 01:00 UTC = 8:00pm US-East (prime) / 6:30am IST
    - cron: '0 7 * * *'    # 07:00 UTC = 12:30pm IST / 8am UK / 2am US-East
    - cron: '30 13 * * *'  # 13:30 UTC = 7:00pm IST (prime) / 9am US-East
    - cron: '0 19 * * *'   # 19:00 UTC = 8:00pm CET Europe (prime) / 3pm US-East
    # ── Backup slots — fire 90 min after each primary ─────────────────────────
    # GitHub Actions free-tier crons can be silently dropped during high load.
    # Backups auto-skip if the primary already succeeded (see "Skip if recent
    # success" step below — uses 80-min lookback).
    - cron: '30 2 * * *'   # backup for 01:00 UTC slot
    - cron: '30 8 * * *'   # backup for 07:00 UTC slot
    - cron: '0 15 * * *'   # backup for 13:30 UTC slot
    - cron: '30 20 * * *'  # backup for 19:00 UTC slot

  workflow_dispatch:
    inputs:
      post_to_social:
        description: 'Post to Facebook + Instagram? (true = post, false = generate only)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      post_to_youtube:
        description: 'Post to YouTube Shorts? (true = post, false = skip)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      custom_topic:
        description: 'Override topic (leave empty for AI-selected)'
        required: false
        default: ''
        type: string
      style:
        description: 'Force a style: love / emotional / nostalgic / poetic / wisdom'
        required: false
        default: ''
        type: string

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    # ── Concurrency lock — only ONE pipeline runs at a time ────────────────────
    # Without this, when GitHub's cron is delayed and fires primary+backup near
    # each other, both can race to pick the same bank script (observed
    # 2026-05-25: runs 26387543353 + 26390540245 both picked bank index #2,
    # producing duplicate videos). The lock makes the second run WAIT for the
    # first to finish committing its state → file-based gap check then catches
    # it and exits clean.
    concurrency:
      group: quietlyy-post-pipeline
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Skip if recent post exists (6-hour minimum gap)
        # File-based gap enforcement. Reads assets/last_post_time.txt — written
        # by every successful run AND committed to repo via the Save step. This
        # is more reliable than gh-api time queries because:
        #   - git state is consistent across runs (no eventual-consistency lag)
        #   - 6h gap is well within the boundary of GitHub cron delays (~3-4h)
        #   - Combined with the concurrency lock above, prevents all race cases
        # Manual workflow_dispatch ALWAYS runs regardless (no gap check).
        id: dedupe
        if: github.event_name == 'schedule'
        run: |
          MIN_GAP_MIN=300  # 5 hours min between posts. 4 posts/day are spaced
                           # ~6h apart, so this passes them but still blocks the
                           # 1-2h duplicate window (the bug this guards against).
          if [ -f "assets/last_post_time.txt" ]; then
            LAST=$(cat assets/last_post_time.txt | tr -d ' \n\r' || echo 0)
            NOW=$(date -u +%s)
            DIFF_MIN=$(( (NOW - LAST) / 60 ))
            DIFF_HR=$(( DIFF_MIN / 60 ))
            echo "Last post: $DIFF_MIN minutes ago (~${DIFF_HR}h)"
            if [ "$DIFF_MIN" -lt "$MIN_GAP_MIN" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "✓ Within 6h of last post — enforcing gap, skipping"
              exit 0
            fi
          else
            echo "No last_post_time.txt — first scheduled run"
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "→ Gap OK ($MIN_GAP_MIN min minimum met), proceeding"

      - name: Set up Python
        if: steps.dedupe.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache apt packages
        if: steps.dedupe.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}-v1
          restore-keys: apt-ffmpeg-${{ runner.os }}-

      - name: Install dependencies
        if: steps.dedupe.outputs.skip != 'true'
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu fonts-liberation

      - name: Run pipeline
        if: steps.dedupe.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          SONAUTO_API_KEY: ${{ secrets.SONAUTO_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.post_to_social }}" = "false" ]; then
            ARGS="$ARGS --skip-post"
          fi
          if [ "${{ github.event.inputs.post_to_youtube }}" = "false" ]; then
            ARGS="$ARGS --skip-youtube"
          fi
          if [ -n "${{ github.event.inputs.custom_topic }}" ]; then
            ARGS="$ARGS --topic=${{ github.event.inputs.custom_topic }}"
          fi
          if [ -n "${{ github.event.inputs.style }}" ]; then
            ARGS="$ARGS --style=${{ github.event.inputs.style }}"
          fi
          python scripts/pipeline.py $ARGS

      - name: Record successful post timestamp (enforces 6h gap on next run)
        if: success() && steps.dedupe.outputs.skip != 'true'
        run: |
          # Only write timestamp if pipeline actually posted (checks for the
          # output marker file the post steps create on success). Otherwise
          # next runs would skip even when this run didn't actually post.
          if [ -f output/post_result.json ] || [ -f output/instagram_result.json ] || [ -f output/youtube_result.json ]; then
            date -u +%s > assets/last_post_time.txt
            echo "Recorded last post timestamp: $(cat assets/last_post_time.txt)"
          else
            echo "Pipeline ran but no post receipts found — not updating last_post_time.txt"
          fi

      - name: Save gallery + research cache to repo
        if: always() && steps.dedupe.outputs.skip != 'true'
        run: |
          git config user.name "Quietlyy Bot"
          git config user.email "bot@quietlyy.com"
          if [ -f output/pipeline_status.json ]; then
            cp output/pipeline_status.json assets/last_run_status.json
          fi
          git add -f assets/gallery/ assets/music_gallery/ assets/market_research.json assets/used_scripts.json assets/used_topics.json assets/last_run_status.json assets/script_bank_state.json assets/last_post_time.txt || true
          git diff --cached --quiet || git commit -m "Bot: gallery + research cache [run #${{ github.run_number }}]"
          git pull --rebase || true
          git push || true

      - name: Show pipeline status in log
        if: always() && steps.dedupe.outputs.skip != 'true'
        run: |
          if [ -f output/pipeline_status.json ]; then
            echo "===== PIPELINE STATUS ====="
            cat output/pipeline_status.json
            echo "==========================="
          fi
          if [ -f output/youtube_error.json ]; then
            echo "::error::YouTube posting failed"
            cat output/youtube_error.json
          fi
          if [ -f output/instagram_error.json ]; then
            echo "::error::Instagram posting failed"
            cat output/instagram_error.json
          fi
          if [ -f output/post_result.json ]; then
            echo "===== FACEBOOK RESULT ====="
            cat output/post_result.json
            echo "==========================="
          fi

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        if: always() && steps.dedupe.outputs.skip != 'true'
        with:
          name: quietlyy-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            output/pipeline_status.json
            output/quietlyy_video.mp4
            output/thumbnail.jpg
            output/script.json
            output/seo_metadata.json
            output/post_result.json
            output/instagram_result.json
            output/instagram_error.json
            output/youtube_result.json
            output/youtube_error.json
            output/manual_caption.txt
            output/copyright_check.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload debug info on failure
        uses: actions/upload-artifact@v4
        if: failure() && steps.dedupe.outputs.skip != 'true'
        with:
          name: debug-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
