name: Quietlyy — Generate & Post Video

on:
  # 2x daily: 11:00 AM IST (05:30 UTC) + 10:00 PM IST (16:30 UTC)
  # Research-backed peak engagement times for nostalgic content in India/global
  schedule:
    - cron: '30 5 * * *'   # 11:00 AM IST — morning scroll peak
    - cron: '30 16 * * *'  # 10:00 PM IST — late-night scroll peak (best for emotional content)

  # Manual trigger (testing / emergency post)
  workflow_dispatch:
    inputs:
      post_to_social:
        description: 'Post to Facebook + Instagram? (true = post, false = generate only)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      post_to_youtube:
        description: 'Post to YouTube Shorts? (true = post, false = skip)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      custom_topic:
        description: 'Override topic (leave empty for AI-selected)'
        required: false
        default: ''
        type: string
      style:
        description: 'Force a style: emotional / nostalgic / love / poetic / wisdom (leave empty for auto)'
        required: false
        default: ''
        type: string

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}-v1
          restore-keys: apt-ffmpeg-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu fonts-liberation

      - name: Run pipeline
        env:
          # Script generation (ChatGPT → Gemini → Groq fallback)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Voice — ElevenLabs only (no fallback: incomplete audio = skip day)
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          # Image generation
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # Background music
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
          # Facebook + Instagram
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          # YouTube Shorts
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.post_to_social }}" = "false" ]; then
            ARGS="$ARGS --skip-post"
          fi
          if [ "${{ github.event.inputs.post_to_youtube }}" = "false" ]; then
            ARGS="$ARGS --skip-youtube"
          fi
          if [ -n "${{ github.event.inputs.custom_topic }}" ]; then
            ARGS="$ARGS --topic=${{ github.event.inputs.custom_topic }}"
          fi
          if [ -n "${{ github.event.inputs.style }}" ]; then
            ARGS="$ARGS --style=${{ github.event.inputs.style }}"
          fi
          python scripts/pipeline.py $ARGS

      - name: Save gallery + research cache to repo
        if: success()
        run: |
          git config user.name "Quietlyy Bot"
          git config user.email "bot@quietlyy.com"
          git add -f assets/gallery/ assets/market_research.json assets/used_scripts.json || true
          git diff --cached --quiet || git commit -m "Bot: gallery + research cache [run #${{ github.run_number }}]"
          git push || true

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quietlyy-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            output/pipeline_status.json
            output/quietlyy_video.mp4
            output/script.json
            output/seo_metadata.json
            output/post_result.json
            output/instagram_result.json
            output/instagram_error.json
            output/youtube_result.json
            output/youtube_error.json
            output/manual_caption.txt
            output/copyright_check.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload debug info on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: debug-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
