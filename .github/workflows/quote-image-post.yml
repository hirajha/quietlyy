name: Quietlyy — Midday Quote Image

on:
  # 2:30 PM IST = 09:00 UTC daily
  schedule:
    - cron: '0 9 * * *'

  # Manual trigger
  workflow_dispatch:
    inputs:
      skip_post:
        description: 'Generate image only, skip posting'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      theme:
        description: 'Quote theme override (leave empty for random)'
        required: false
        default: ''
        type: string

jobs:
  quote-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y fonts-liberation fonts-dejavu

      - name: Generate and post quote image
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.skip_post }}" = "true" ]; then
            ARGS="$ARGS --skip-post"
          fi
          if [ -n "${{ github.event.inputs.theme }}" ]; then
            ARGS="$ARGS --theme=${{ github.event.inputs.theme }}"
          fi
          python scripts/pipeline_quote.py $ARGS

      - name: Upload quote image artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quote-image-${{ github.run_number }}
          path: |
            output/quote_image.jpg
            output/quote_image.json
            output/quote_post_result.json
          retention-days: 30
          if-no-files-found: ignore
