name: Probe ElevenLabs Models

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe ElevenLabs Music + subscription
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error
          key = os.environ["ELEVENLABS_API_KEY"]

          def call(method, url, body=None):
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, method=method,
                    headers={"xi-api-key": key, "Content-Type": "application/json"})
              try:
                  r = urllib.request.urlopen(req, timeout=60)
                  return r.status, r.read()
              except urllib.error.HTTPError as e:
                  return e.code, e.read()
              except Exception as e:
                  return "ERR", str(e).encode()

          print("=== Subscription / plan ===")
          s, b = call("GET", "https://api.elevenlabs.io/v1/user/subscription")
          try:
              d = json.loads(b)
              print("  tier:", d.get("tier"))
              print("  character_limit:", d.get("character_limit"))
              print("  can_extend:", d.get("can_extend_character_limit"))
              # surface any music-related flags
              for k in d:
                  if "music" in k.lower() or "song" in k.lower():
                      print("  ", k, "=", d[k])
          except Exception:
              print("  ", s, b[:200])

          print("\n=== Music API: POST /v1/music ===")
          s, b = call("POST", "https://api.elevenlabs.io/v1/music",
                      {"prompt": "soft sad emotional piano, cinematic, no vocals",
                       "music_length_ms": 15000})
          print("  status:", s, "| body:", b[:200].decode(errors="replace"))

          print("\n=== Music API alt: /v1/music/compose ===")
          s, b = call("POST", "https://api.elevenlabs.io/v1/music/compose",
                      {"prompt": "soft sad emotional piano, cinematic, no vocals",
                       "music_length_ms": 15000})
          print("  status:", s, "| body:", b[:200].decode(errors="replace"))
          PY
