name: Keep Alive — Prevent Cron Disable

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 3 AM UTC
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep workflow active
        run: |
          git config user.name "Quietlyy Bot"
          git config user.email "bot@quietlyy.com"
          echo "$(date -u)" > .github/last-keepalive
          git add .github/last-keepalive
          git commit -m "chore: keep-alive ping [skip ci]" || echo "Nothing to commit"
          git push || echo "Push failed, workflow still active"
